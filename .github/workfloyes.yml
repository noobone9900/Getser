name: Build APK and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Create Pages site
        run: |
          mkdir site
          cp app/build/outputs/apk/release/*.apk site/app-release.apk

          cat > site/index.html << EOF
          <html>
          <body>
            <h1>Download APK</h1>
            <a href="app-release.apk">Download APK</a>
          </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
