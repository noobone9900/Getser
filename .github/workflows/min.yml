name: Deploy APK Site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create public folder
        run: mkdir public

      - name: Create HTML page
        run: |
          echo "<html><body>" > public/index.html
          echo "<h1>Download APK</h1>" >> public/index.html
          echo "<a href='app.apk'>Download APK</a>" >> public/index.html
          echo "</body></html>" >> public/index.html

      - name: Copy APK
        run: cp app.apk public/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
